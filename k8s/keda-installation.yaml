---
# KEDA Installation Manifest
# Installs KEDA (Kubernetes Event-driven Autoscaling) v2.13.0
# This enables scaling based on Redis queue depth instead of CPU/memory

apiVersion: v1
kind: Namespace
metadata:
  name: keda
  labels:
    name: keda
    pod-security.kubernetes.io/enforce: restricted

---
# KEDA Operator Deployment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.13.0
    helm:
      values: |
        operator:
          replicas: 2
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        metricsServer:
          replicas: 2
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        admissionWebhooks:
          enabled: true
          metricServer:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

---
