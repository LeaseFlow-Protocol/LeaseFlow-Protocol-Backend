---
# Worker Deployments for BullMQ Processing
# These deployments are scaled by KEDA based on Redis queue depth

---
# PDF Generation Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaseflow-backend-worker-pdf
  namespace: default
  labels:
    app: leaseflow-backend
    component: pdf-worker
spec:
  replicas: 0  # KEDA will manage replicas
  selector:
    matchLabels:
      app: leaseflow-backend
      component: pdf-worker
  template:
    metadata:
      labels:
        app: leaseflow-backend
        component: pdf-worker
    spec:
      serviceAccountName: leaseflow-backend-worker
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: pdf-worker
          image: "docker.io/leaseflow/backend:latest"
          imagePullPolicy: IfNotPresent
          command: ["node", "worker.js"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: WORKER_TYPE
              value: "pdf-generation"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: leaseflow-backend-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: leaseflow-backend-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: leaseflow-backend-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_TLS
              value: "true"
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
      terminationGracePeriodSeconds: 60

