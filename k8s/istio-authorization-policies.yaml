---
# Istio Authorization Policies for Zero-Trust Service-to-Service Access
# These policies enforce strict authorization rules - only authorized services can communicate

---
# Allow Backend API to access PostgreSQL
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backend-to-postgresql
  namespace: default
spec:
  selector:
    matchLabels:
      app: postgresql
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/leaseflow-backend-worker
              - cluster.local/ns/default/sa/leaseflow-backend
      to:
        - operation:
            ports:
              - "5432"

---
# Allow Backend API to access Redis
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backend-to-redis
  namespace: default
spec:
  selector:
    matchLabels:
      app: redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/leaseflow-backend-worker
              - cluster.local/ns/default/sa/leaseflow-backend
      to:
        - operation:
            ports:
              - "6379"

---
# Allow PDF Worker to access Redis
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: pdf-worker-to-redis
  namespace: default
spec:
  selector:
    matchLabels:
      app: redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/leaseflow-backend-worker
      to:
        - operation:
            ports:
              - "6379"
      when:
        - key: source.labels
          values:
            - component: pdf-worker

---
# Allow IoT Worker to access Redis
apiVersion: security.istio.io/v1beta1
