---
# Allow Backend API to accept traffic from Istio Ingress Gateway
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: ingress-to-backend
  namespace: default
spec:
  selector:
    matchLabels:
      app: leaseflow-backend
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account
      to:
        - operation:
            ports:
              - "4000"

---
# Allow Backend API to accept traffic from Gateway (if using Apollo Federation)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: gateway-to-backend
  namespace: default
spec:
  selector:
    matchLabels:
      app: leaseflow-backend
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/leaseflow-gateway
      to:
        - operation:
            ports:
              - "4000"

---
# Allow Workers to accept traffic from Backend API only
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backend-to-pdf-worker
  namespace: default
spec:
  selector:
    matchLabels:
      app: leaseflow-backend
      component: pdf-worker
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/default/sa/leaseflow-backend
      to:
        - operation:
            ports:
              - "4000"

---
apiVersion: security.istio.io/v1beta1
