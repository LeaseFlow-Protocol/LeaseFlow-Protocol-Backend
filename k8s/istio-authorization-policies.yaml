---
# Deny all other traffic to PostgreSQL (default deny)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-postgresql
  namespace: default
spec:
  selector:
    matchLabels:
      app: postgresql
  action: DENY

---
# Deny all other traffic to Redis (default deny)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-redis
  namespace: default
spec:
  selector:
    matchLabels:
      app: redis
  action: DENY

---
# Deny all other traffic to Backend API (default deny)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-backend
  namespace: default
spec:
  selector:
    matchLabels:
      app: leaseflow-backend
  action: DENY

---
# Deny all other traffic to Workers (default deny)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-workers
  namespace: default
spec:
  selector:
    matchLabels:
      app: leaseflow-backend
  action: DENY
  rules:
    - from:
        - source:
            notPrincipals:
              - cluster.local/ns/default/sa/leaseflow-backend
              - cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account
