---
# Allow Indexer Worker to access PostgreSQL
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: indexer-worker-to-postgresql
  namespace: default
spec:
  selector:
    matchLabels:
