{{- if .Values.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "leaseflow-backend.fullname" . }}
  labels:
    {{- include "leaseflow-backend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "leaseflow-backend.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleDownStabilizationSeconds | default 300 }}
      policies:
        - type: Percent
          value: {{ .Values.autoscaling.scaleDownPercent | default 50 }}
          periodSeconds: {{ .Values.autoscaling.scaleDownPeriodSeconds | default 60 }}
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleUpStabilizationSeconds | default 0 }}
      policies:
        - type: Percent
          value: {{ .Values.autoscaling.scaleUpPercent | default 100 }}
          periodSeconds: {{ .Values.autoscaling.scaleUpPeriodSeconds | default 30 }}
        - type: Pods
          value: {{ .Values.autoscaling.scaleUpPods | default 2 }}
          periodSeconds: {{ .Values.autoscaling.scaleUpPeriodSeconds | default 30 }}
      selectPolicy: Max
{{- end }}
