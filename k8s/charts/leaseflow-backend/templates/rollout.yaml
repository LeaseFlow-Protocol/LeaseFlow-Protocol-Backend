{{- if .Values.argoRollouts.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "leaseflow-backend.fullname" . }}
  labels:
    {{- include "leaseflow-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "leaseflow-backend.selectorLabels" . | nindent 6 }}
  strategy:
    {{- if eq .Values.argoRollouts.strategy "bluegreen" }}
    blueGreen:
      activeService: {{ include "leaseflow-backend.fullname" . }}-active
      previewService: {{ include "leaseflow-backend.fullname" . }}-preview
      previewReplicaCount: {{ .Values.argoRollouts.previewReplicaCount | default 1 }}
      autoPromotionEnabled: {{ .Values.argoRollouts.autoPromotionEnabled | default false }}
      scaleDownDelaySeconds: {{ .Values.argoRollouts.scaleDownDelaySeconds | default 30 }}
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "leaseflow-backend.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      analysis:
        templates:
          - templateName: {{ include "leaseflow-backend.fullname" . }}-analysis
        args:
          - name: service-name
            value: {{ include "leaseflow-backend.fullname" . }}-preview
      prePromotionAnalysis:
        templates:
          - templateName: {{ include "leaseflow-backend.fullname" . }}-pre-promotion-analysis
        args:
          - name: service-name
            value: {{ include "leaseflow-backend.fullname" . }}-preview
      postPromotionAnalysis:
        templates:
          - templateName: {{ include "leaseflow-backend.fullname" . }}-post-promotion-analysis
        args:
          - name: service-name
            value: {{ include "leaseflow-backend.fullname" . }}-active
    {{- else if eq .Values.argoRollouts.strategy "canary" }}
    canary:
      canaryService: {{ include "leaseflow-backend.fullname" . }}-canary
      stableService: {{ include "leaseflow-backend.fullname" . }}-stable
      trafficRouting:
        nginx:
          stableIngress: {{ include "leaseflow-backend.fullname" . }}
      steps:
        - setWeight: 10
        - pause: { duration: 1m }
        - analysis:
            templates:
              - templateName: {{ include "leaseflow-backend.fullname" . }}-analysis
            args:
              - name: service-name
                value: {{ include "leaseflow-backend.fullname" . }}-canary
        - setWeight: 25
        - pause: { duration: 1m }
        - analysis:
            templates:
              - templateName: {{ include "leaseflow-backend.fullname" . }}-analysis
            args:
              - name: service-name
                value: {{ include "leaseflow-backend.fullname" . }}-canary
        - setWeight: 50
        - pause: { duration: 1m }
        - analysis:
            templates:
              - templateName: {{ include "leaseflow-backend.fullname" . }}-analysis
            args:
              - name: service-name
                value: {{ include "leaseflow-backend.fullname" . }}-canary
        - setWeight: 100
    {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        # Vault Agent Injector annotations
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-status: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-config-map: "vault-agent-config"
        vault.hashicorp.com/secret-volume-path: "/vault/secrets"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "leaseflow-backend.selectorLabels" . | nindent 8 }}
        {{- if .Values.argoRollouts.strategy }}
        rollout-status: "{{ .Values.argoRollouts.strategy }}"
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "leaseflow-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Values.configMap.data.DB_HOST }} -p {{ .Values.configMap.data.DB_PORT }} -U {{ .Values.secrets.data.DB_USER }}; do
                echo "Waiting for database..."
                sleep 2
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: DB_PASSWORD
        # Wait for Redis to be ready
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h {{ .Values.configMap.data.REDIS_HOST }} -p {{ .Values.configMap.data.REDIS_PORT }} ping; do
                echo "Waiting for Redis..."
                sleep 2
              done
        {{- if .Values.migration.enabled }}
        # Database migration initContainer
        - name: run-migrations
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Starting database migrations..."
              {{- if .Values.migration.vault.enabled }}
              echo "Fetching database credentials from Vault..."
              export DB_PASSWORD=$(vault kv get -field=password {{ .Values.migration.vault.secretPath }})
              {{- end }}
              export DB_HOST={{ .Values.configMap.data.DB_HOST }}
              export DB_PORT={{ .Values.configMap.data.DB_PORT }}
              export DB_NAME={{ .Values.configMap.data.DB_NAME }}
              export DB_USER={{ .Values.secrets.data.DB_USER }}
              export POD_ID=$(hostname)
              export MIGRATIONS_DIR=/migrations
              
              /usr/local/bin/run-migrations.sh run
              
              if [ $? -eq 0 ]; then
                echo "Migrations completed successfully"
                exit 0
              else
                echo "Migrations failed, aborting pod startup"
                exit 1
              fi
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMap.name }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMap.name }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.configMap.name }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: DB_USER
            {{- if .Values.migration.vault.enabled }}
            - name: VAULT_ADDR
              value: {{ .Values.migration.vault.address }}
            - name: VAULT_ROLE
              value: {{ .Values.migration.vault.role }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migration.vault.tokenSecret }}
                  key: token
            {{- else }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: DB_PASSWORD
            {{- end }}
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOCK_TIMEOUT
              value: "{{ .Values.migration.lockTimeout }}"
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- end }}
      containers:
        # Main application container
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            # Metrics port
            - name: metrics
              containerPort: {{ .Values.metrics.prometheus.port }}
              protocol: TCP
          env:
            # Environment variables from ConfigMap
            {{- range $key, $value := .Values.configMap.data }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configMap.name }}
                  key: {{ $key }}
            {{- end }}
            {{- if .Values.vault.enabled }}
            # Environment variables from Vault (injected via sidecar)
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configMap.name }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configMap.name }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ $.Values.configMap.name }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: JWT_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: REDIS_PASSWORD
            - name: STELLAR_NETWORK_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: STELLAR_NETWORK_PASSPHRASE
            - name: SOROBAN_NETWORK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: SOROBAN_NETWORK_URL
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: SENTRY_DSN
            - name: IPFS_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: IPFS_PROJECT_ID
            - name: IPFS_PROJECT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: IPFS_PROJECT_SECRET
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: SENDGRID_API_KEY
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.vault.secretsName }}
                  key: TWILIO_AUTH_TOKEN
            {{- else }}
            # Environment variables from Secrets (fallback if Vault disabled)
            {{- range $key, $value := .Values.secrets.data }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.name }}
                  key: {{ $key }}
            {{- end }}
            {{- end }}
            # Additional environment variables
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            # Redis cache key isolation for Blue/Green
            - name: CACHE_KEY_PREFIX
              value: "{{ .Values.argoRollouts.cacheKeyPrefix | default "leaseflow" }}"
            - name: DEPLOYMENT_COLOR
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['rollout-status']
          # Liveness probe
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          # Readiness probe
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          # Startup probe
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          # Resource limits
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Volume mounts
          volumeMounts:
            {{- range .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.vault.enabled }}
            # Vault secrets volume mount
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            {{- end }}
        # Sidecar container for log shipping (optional)
        {{- if .Values.logging.elasticsearch.enabled }}
        - name: log-shipper
          image: fluent/fluent-bit:latest
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: {{ .Values.logging.elasticsearch.host }}
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "{{ .Values.logging.elasticsearch.port }}"
            - name: FLUENT_ELASTICSEARCH_INDEX
              value: {{ .Values.logging.elasticsearch.index }}
          volumeMounts:
            - name: logs
              mountPath: /app/logs
              readOnly: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        {{- end }}
      # Volumes
      volumes:
        {{- range .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        # Vault secrets volume (injected by Vault Agent)
        - name: vault-secrets
          emptyDir:
            medium: Memory
        {{- end }}
      # Node selector
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Affinity
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Tolerations
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 60
{{- end }}
