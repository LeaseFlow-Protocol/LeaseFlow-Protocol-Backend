---
# KEDA ScaledObjects for BullMQ Worker Scaling
# Scales worker pods based on exact Redis queue depth
# Supports scale-to-zero when queues are empty

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: leaseflow-pdf-worker-scaler
  namespace: default
  labels:
    app: leaseflow-backend
    component: pdf-worker
spec:
  scaleTargetRef:
    name: leaseflow-backend-worker-pdf
    apiVersion: apps/v1
  minReplicaCount: 0  # Scale to zero when queue is empty
  maxReplicaCount: 20 # Maximum 20 workers for PDF generation
  cooldownPeriod: 300 # 5 minutes cooldown before scaling down
  pollingInterval: 15 # Check queue depth every 15 seconds
  triggers:
    - type: redis
      metadata:
        # Redis connection details (from secret)
        addressFromEnv: REDIS_HOST
        portFromEnv: REDIS_PORT
        passwordFromEnv: REDIS_PASSWORD
        # TLS configuration
        tls: "true"
        # Queue configuration
        listName: bull:lease-pdf-generation:waiting
        listLength: "500" # Scale up when queue exceeds 500 jobs
        # Scaling behavior
        activationListLength: "10" # Activate scaler when queue has 10+ jobs
      authenticationRef:
        name: keda-redis-auth

