---
# KEDA Authentication Secret for Redis
# Stores Redis credentials securely
apiVersion: v1
kind: Secret
metadata:
  name: keda-redis-auth
  namespace: default
type: Opaque
stringData:
  redisHost: "redis-service"
  redisPort: "6379"
  redisPassword: "" # Set via kubectl create secret or external secret manager
  redisTLS: "true"

---
# TriggerAuthentication for Redis
# References the secret above
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-redis-auth
  namespace: default
spec:
  secretTargetRef:
    - parameter: address
      name: keda-redis-auth
      key: redisHost
    - parameter: port
      name: keda-redis-auth
      key: redisPort
    - parameter: password
      name: keda-redis-auth
      key: redisPassword
